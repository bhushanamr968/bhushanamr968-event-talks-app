<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Event Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tech Talks Event Schedule</h1>
        <p>A day filled with insightful technical discussions.</p>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="categorySearch" placeholder="Search by category (e.g., AI, Web Dev)">
        </section>

        <section class="schedule-section">
            <h2>Today's Schedule</h2>
            <div id="scheduleContainer" class="schedule-grid">
                <!-- Schedule will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tech Talks Event. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
